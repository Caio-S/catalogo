services:
  - type: web
    name: catalogo-ch570
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: RUN_SCHEDULER
        value: "1"
      - key: MARIADB_HOST
        sync: false
      - key: MARIADB_PORT
        value: "3306"
      - key: MARIADB_USER
        sync: false
      - key: MARIADB_PASS
        sync: false
      - key: MARIADB_DB
        sync: false
